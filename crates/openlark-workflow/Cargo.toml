[package]
name = "openlark-workflow"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
documentation.workspace = true
description = "OpenLark 工作流模块 - 提供飞书任务/审批/看板 API"
keywords = ["feishu", "lark", "workflow", "api", "sdk"]

[lints]
workspace = true

[dependencies]
openlark-core = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
reqwest = { workspace = true }
tokio = { workspace = true, optional = true }
tracing = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["full"] }
insta = { workspace = true }

[features]
default = ["v1", "v2", "async", "board"]
async = ["tokio"]

# 任务 API 版本
v1 = []
v2 = []

# 看板模块
board = []

# 完整功能集
full = ["v1", "v2", "async", "board"]

[package.metadata.cargo-machete]
ignored = ["reqwest", "tokio", "tracing"]
